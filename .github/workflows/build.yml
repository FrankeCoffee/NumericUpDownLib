name: Build & Publish NuGet

# on:
#   push:
#     tags:
#       - 'v*'

on: [push]

jobs:
  build:
    permissions:
      id-token: write   # enable GitHub OIDC token issuance for this job

    runs-on: windows-latest
    strategy:
      matrix:
        dotnet:
          - version: '4.8.1'
            type: framework
          - version: '10.0.x'
            type: sdk

    steps:
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address

      - name: Checkout
        uses: actions/checkout@v6

      - name: setup .NET ${{ matrix.dotnet.version }} SDK
        uses: actions/setup-dotnet@v4

      # - name: Setup .NET ${{ matrix.dotnet.version }} SDK
      #   if: matrix.dotnet.type == 'sdk'
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: ${{ matrix.dotnet.version }}
      #     # include-prerelease: true

      #     # MS Build + .NET Framework targeting support
      # - name: Setup MSBuild
      #   if: matrix.dotnet.type == 'framework'
      #   uses: microsoft/setup-msbuild@v2
      #   # with:
      #   #   vs-version: 'latest'

      - name: Display .NET version
        if: matrix.dotnet.type == 'sdk'
        run: dotnet --version

      - name: Restore
        run: dotnet restore source\NumericUpDownLib\NumericUpDownLib.csproj

      # - name: Restore Strong Name Key
        # run: |
        #   echo "${{ secrets.STRONG_NAME_KEY }}" | base64 --decode > NumericUpDownLibKeyPair.snk

      - name: Restore Strong Name Key
        run: |
          $base64String = "${{ secrets.STRONG_NAME_KEY }}"
          $bytes = [Convert]::FromBase64String($base64String)
          [System.IO.File]::WriteAllBytes("source\NumericUpDownLib\NumericUpDownLibKeyPair.snk", $bytes)

      - name: Build
        run: dotnet build source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-restore

      # - name: Build (.NET Core)
      #   if: matrix.dotnet.type == 'sdk'
      #   run: dotnet build source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-restore

      # - name: Build (.NET Framework)
      #   if: matrix.dotnet.type == 'framework'
      #   run: msbuild.exe source\NumericUpDownLib\NumericUpDownLib.csproj /p:platform="Any CPU" /p:configuration="Release" /t:pack

      # - name: Test
      #   run: dotnet test --configuration Release --no-build

     # - name: Pack (.NET Core)
     #   run: dotnet pack source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-build
        #run: dotnet pack source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-build -o ./artifacts

      # - name: Pack (.NET Framework)
      #   run: dotnet pack source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-build -o ./artifacts

      # - name: Publish to NuGet
        # run: dotnet nuget push "./artifacts/*.nupkg" \
        #       --api-key ${{ secrets.NUGET_API_KEY }} \
        #       --source https://api.nuget.org/v3/index.json

        # Push the package
      #- name: NuGet push
        #run: dotnet nuget push nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
        # run: dotnet nuget push "./artifacts/***.NumericUpDownLib.3.5.1.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: push to NuGet
        # Only push to NuGet if we're building a tag (optional)
        # if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        # Loop through all the packages in the output folder and push them to
        # nuget.org, using the NUGET_API_KEY generated by the previous login step
        run: |
          Get-ChildItem source\nupkg -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json
          }
