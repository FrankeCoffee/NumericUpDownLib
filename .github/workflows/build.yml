name: Build & Publish NuGet

# on:
#   push:
#     tags:
#       - 'v*'

on: [push]

jobs:
  build:
    permissions:
      id-token: write   # enable GitHub OIDC token issuance for this job

    runs-on: windows-2019
    strategy:
      matrix:
        dotnet-version: ['4.8.1','10.0.x']

    steps:
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Display .NET version
        run: dotnet --version

      - name: Restore
        run: dotnet restore source\NumericUpDownLib\NumericUpDownLib.csproj

      # - name: Restore Strong Name Key
        # run: |
        #   echo "${{ secrets.STRONG_NAME_KEY }}" | base64 --decode > NumericUpDownLibKeyPair.snk

      - name: Restore Strong Name Key
        run: |
          $base64String = "${{ secrets.STRONG_NAME_KEY }}"
          $bytes = [Convert]::FromBase64String($base64String)
          [System.IO.File]::WriteAllBytes("NumericUpDownLibKeyPair.snk", $bytes)

      - name: Build
        run: dotnet build source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-restore

      # - name: Test
      #   run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack source\NumericUpDownLib\NumericUpDownLib.csproj --configuration Release --no-build -o ./artifacts

      # - name: Publish to NuGet
        # run: dotnet nuget push "./artifacts/*.nupkg" \
        #       --api-key ${{ secrets.NUGET_API_KEY }} \
        #       --source https://api.nuget.org/v3/index.json

        # Push the package
      - name: NuGet push
        run: dotnet nuget push artifacts/my-sdk.nupkg --api-key ${{secrets.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
